name: build-and-test

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install dependencies
        run: dotnet restore
      - name: Download OSRM wrapper .so
        run: |
            mkdir -p Core/native
            curl -L https://github.com/SmartEVP8/OSRM_Wrapper/releases/download/v0.0.3/libosrm_wrapper.so \
            -o Core/native/libosrm_wrapper.so
      - name: Build
        run: dotnet build --no-restore
      - name: Test with the dotnet CLI
        run: dotnet test --no-build